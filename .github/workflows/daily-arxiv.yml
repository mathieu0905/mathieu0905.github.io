name: Daily arXiv Paper Recommender

# 注意：此 workflow 需要 ANTHROPIC_API_KEY secret
# 如果你用本地已登录的 Claude Code，请用 scripts/run-arxiv-daily.sh + crontab 代替

on:
  # schedule:
  #   - cron: "0 8 * * *"
  workflow_dispatch: # 手动触发（备用）

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch arXiv papers
        env:
          ARXIV_CATEGORIES: "cs.SE,cs.CR,cs.CL,cs.AI,cs.LG,cs.PL"
          ARXIV_MAX_RESULTS: "50"
        run: node scripts/daily-arxiv.mjs

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate blog post via Claude Code agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat scripts/arxiv-agent-prompt.md)" \
            --allowedTools "Read,Write,Bash(rm)" \
            --max-turns 10

      - name: Commit and push if new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/posts/
          if git diff --cached --quiet; then
            echo "No new posts to commit"
          else
            git commit -m "docs: add daily arXiv paper recommendations $(date +%Y-%m-%d)"
            git push
          fi
